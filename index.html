<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smygrys Trash Rotation</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="script.js"></script>
</head>
<body>

  <!-- WELCOME MODAL -->
  <div id="welcomeModal" class="welcome-modal">
    <div class="welcome-card">
      
      <!-- Progress Dots -->
      <div class="progress-dots">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

      <!-- Gradient Icon -->
      <div class="gradient-icon">🗑️</div>

      <!-- Title -->
      <h1 class="welcome-title">Welcome to<br>Smygrys Trash</h1>

      <!-- About Section -->
      <div class="about-box">
        <p>🏠 <strong>Shared household trash rotation</strong></p>
        <p>📅 Smart scheduling • 🤝 Voting system</p>
        <p class="text-muted">Keep your place organized together</p>
      </div>
      
      <!-- Name Input -->
      <div class="form-group">
        <label>YOUR NAME</label>
        <input 
          type="text" 
          id="welcomeNameInput" 
          placeholder="Enter your name" 
        />
      </div>
      
      <!-- Language Selection -->
      <div class="form-group">
        <label>LANGUAGE</label>
        <select id="welcomeLanguageSelect">
          <option value="en">English</option>
          <option value="pl">Polski</option>
          <option value="uk">Українська</option>
        </select>
      </div>
      
      <!-- CTA Button -->
      <button onclick="startApp()" class="btn-gradient">
        Get Started <span>→</span>
      </button>
    </div>
  </div>

  <!-- MAIN APP -->
  <div class="app-container">
    
    <!-- Header -->
    <header class="header">
      <div class="header-content">
        <div>
          <h1 id="appTitle">🗑️ Trash Bin</h1>
          <p id="headerSubtitle">Shared Rotation</p>
        </div>
        <button onclick="showWelcomeModal()" class="btn-settings">⚙️</button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="content">
      
      <!-- Today's Card -->
      <div class="today-card">
        <p class="label" id="todayLabel">TODAY'S RESPONSIBLE</p>
        <div id="todayPerson" class="person-name">—</div>
        <div id="todayDate" class="date-text"></div>
        <button onclick="markDone()" class="btn-primary" id="markDoneBtn">
          Mark as Done ✓
        </button>
      </div>

      <!-- Week Section -->
      <h2 class="section-title" id="weekTitle">This Week</h2>
      <div class="week-grid" id="weekList"></div>

      <!-- Proposals Section -->
      <h2 class="section-title proposals-title" id="proposalsTitle">Pending Proposals</h2>
      <div id="proposalsList" class="proposals-list"></div>

      <!-- History Section -->
      <h2 class="section-title" id="historyTitle">History</h2>
      <div class="stats-grid" id="stats"></div>
      <div id="historyList" class="history-list"></div>

    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <button onclick="showTab(0)" id="tab0" class="nav-btn active">🏠 Home</button>
      <button onclick="showTab(1)" id="tab1" class="nav-btn">📊 History</button>
    </nav>

  </div>

</body>
</html>
