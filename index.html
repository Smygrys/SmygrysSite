<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="description" content="Shared household trash rotation app"/>
  <meta name="theme-color" content="#a855f7"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Smygrys Trash"/>
  
  <title>Smygrys Trash Rotation</title>
  
  <link rel="manifest" href="manifest.json"/>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23a855f7' width='192' height='192' rx='45'/><text x='96' y='96' font-size='100' text-anchor='middle' dominant-baseline='middle' font-family='Arial'>🗑️</text></svg>"/>
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%23a855f7' width='180' height='180' rx='40'/><text x='90' y='90' font-size='90' text-anchor='middle' dominant-baseline='middle' font-family='Arial'>🗑️</text></svg>"/>
  
  <link rel="stylesheet" href="style.css">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ============ WELCOME MODAL ============ -->
  <div id="welcomeModal" class="welcome-modal">
    <div class="welcome-card">
      
      <div class="progress-dots">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

      <div class="gradient-icon">🗑️</div>

      <h1 class="welcome-title" id="welcomeTitle">Welcome to<br>Smygrys Trash<br>Rotation</h1>

      <div class="about-box" id="aboutBox">
        <p>🏠 <strong>Shared household trash rotation</strong></p>
        <p>📅 Pick your days • 🤝 Join with friends</p>
        <p class="text-muted">Start with your name and preferred days</p>
      </div>
      
      <!-- Language Selection -->
      <div class="form-group">
        <label id="selectLanguageLabel">LANGUAGE</label>
        <select id="welcomeLanguageSelect" class="form-input">
          <option value="en">English</option>
          <option value="pl">Polski</option>
          <option value="uk">Українська</option>
        </select>
      </div>

      <!-- Name Input -->
      <div class="form-group">
        <label id="yourNameLabel">YOUR NAME</label>
        <input 
          type="text" 
          id="joinName" 
          placeholder="Enter your name" 
          class="form-input"
          autocomplete="off"
        />
      </div>

      <!-- Days Selection -->
      <div class="form-group">
        <label id="selectDaysLabel">PICK YOUR DAYS (optional)</label>
        <div class="days-picker" id="daysPicker">
          <label class="day-checkbox">
            <input type="checkbox" value="Monday" class="day-check"/>
            <span>Mon</span>
          </label>
          <label class="day-checkbox">
            <input type="checkbox" value="Tuesday" class="day-check"/>
            <span>Tue</span>
          </label>
          <label class="day-checkbox">
            <input type="checkbox" value="Wednesday" class="day-check"/>
            <span>Wed</span>
          </label>
          <label class="day-checkbox">
            <input type="checkbox" value="Thursday" class="day-check"/>
            <span>Thu</span>
          </label>
          <label class="day-checkbox">
            <input type="checkbox" value="Friday" class="day-check"/>
            <span>Fri</span>
          </label>
          <label class="day-checkbox">
            <input type="checkbox" value="Saturday" class="day-check"/>
            <span>Sat</span>
          </label>
          <label class="day-checkbox">
            <input type="checkbox" value="Sunday" class="day-check"/>
            <span>Sun</span>
          </label>
        </div>
      </div>

      <!-- Join Button -->
      <button onclick="window.joinApp()" class="btn-gradient" id="joinBtn">
        Join Now <span>→</span>
      </button>

    </div>
  </div>

  <!-- ============ MAIN APP ============ -->
  <div class="app-container hidden" id="mainApp">
    
    <!-- Header -->
    <header class="header">
      <div class="header-content">
        <div class="header-title">
          <h1 id="appTitle">🗑️ Trash Bin</h1>
          <p id="headerSubtitle">Shared Rotation</p>
        </div>
        <div class="header-actions">
          <button onclick="window.showInstallPrompt()" id="installBtn" class="btn-icon hidden" title="Install">⬇️</button>
          <button onclick="window.showWelcomeModal()" class="btn-icon" title="Settings">⚙️</button>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="content" id="contentHome">
      
      <!-- Members Section -->
      <h2 class="section-title" id="membersTitle">Members</h2>
      <div class="members-list" id="membersList"></div>

      <!-- Today's Card -->
      <div class="today-card">
        <p class="label" id="todayLabel">TODAY'S RESPONSIBLE</p>
        <div id="todayPerson" class="person-name">—</div>
        <div id="todayDate" class="date-text"></div>
        <button onclick="window.markDone()" class="btn-primary" id="markDoneBtn">
          Mark as Done ✓
        </button>
      </div>

      <!-- Week Section -->
      <h2 class="section-title" id="weekTitle">This Week</h2>
      <div class="week-grid" id="weekList"></div>

      <!-- Proposals Section -->
      <h2 class="section-title proposals-title" id="proposalsTitle">Pending Proposals</h2>
      <div id="proposalsList" class="proposals-list"></div>

    </main>

    <!-- History Tab -->
    <main class="content hidden" id="contentHistory">
      <h2 class="section-title" id="historyTitle">History</h2>
      <div class="stats-grid" id="stats"></div>
      <div id="historyList" class="history-list"></div>
    </main>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
      <button onclick="window.switchTab('home')" id="tabHome" class="nav-btn active">🏠 Home</button>
      <button onclick="window.switchTab('history')" id="tabHistory" class="nav-btn">📊 History</button>
    </nav>

  </div>

  <script type="module" src="config.js"></script>
  <script type="module" src="script.js"></script>

</body>
</html>
