<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="description" content="Trash rotation for boarding school"/>
  <meta name="theme-color" content="#a855f7"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="Trash Rotation"/>
  
  <title>Trash Rotation</title>
  
  <link rel="manifest" href="manifest.json"/>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <!-- WELCOME MODAL -->
  <div id="welcomeModal" class="welcome-modal">
    
    <!-- PARTICLES CONTAINER (Inside Modal) -->
    <div id="particles" class="particles-container"></div>

    <div class="welcome-card">
      
      <div class="progress-dots">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

      <div class="gradient-icon">🗑️</div>

      <h1 class="welcome-title">Trash Rotation</h1>

      <div class="about-box">
        <p>🏠 <strong>Shared boarding school trash duty</strong></p>
        <p>📅 Mon-Fri • 🤝 Pick your days</p>
      </div>
      
      <!-- Language -->
      <div class="form-group">
        <label>LANGUAGE</label>
        <select id="langSelect" class="form-input">
          <option value="en">English</option>
          <option value="pl">Polski</option>
          <option value="uk">Українська</option>
        </select>
      </div>

      <!-- Name -->
      <div class="form-group">
        <label>YOUR NAME</label>
        <input type="text" id="nameInput" placeholder="Enter name" class="form-input" autocomplete="off"/>
      </div>

      <!-- Days -->
      <div class="form-group">
        <label>PICK YOUR DAYS</label>
        <div class="days-picker">
          <label class="day-checkbox"><input type="checkbox" value="Monday"/><span>Mon</span></label>
          <label class="day-checkbox"><input type="checkbox" value="Tuesday"/><span>Tue</span></label>
          <label class="day-checkbox"><input type="checkbox" value="Wednesday"/><span>Wed</span></label>
          <label class="day-checkbox"><input type="checkbox" value="Thursday"/><span>Thu</span></label>
          <label class="day-checkbox"><input type="checkbox" value="Friday"/><span>Fri</span></label>
        </div>
      </div>

      <!-- Notifications Toggle -->
      <div class="form-group">
        <label>
          <input type="checkbox" id="enableNotifications" checked/>
          <span>📢 Enable push notifications at 10 PM</span>
        </label>
      </div>

      <button class="btn-gradient" id="joinBtn">Join Now →</button>

    </div>
  </div>

  <!-- NOTIFICATION DISPLAY (for admin notifications) -->
  <div id="notificationDisplay" class="notification-display hidden"></div>

  <!-- MAIN APP -->
  <div class="app-container hidden" id="mainApp">
    
    <header class="header">
      <div class="header-content">
        <h1 id="title">🗑️ Trash Rotation</h1>
      </div>
    </header>

    <main class="content" id="contentHome">
      
      <!-- WIDGET - Calendar View -->
      <div class="widget-calendar">
        <h3 class="widget-title">📅 This Week's Schedule</h3>
        <div class="calendar-grid" id="calendarWidget"></div>
      </div>

      <!-- Members -->
      <h2 class="section-title">Members</h2>
      <div id="membersList" class="members-list"></div>

      <!-- Today -->
      <div class="today-card">
        <p class="label">TODAY'S TURN</p>
        <div id="todayPerson" class="person-name">—</div>
        <div id="todayDate" class="date-text"></div>
        <button class="btn-primary" id="markDoneBtn">Done ✓</button>
      </div>

      <!-- Week -->
      <h2 class="section-title">This Week</h2>
      <div class="week-grid" id="weekList"></div>

      <!-- Proposals -->
      <h2 class="section-title proposals-title">Pending Changes</h2>
      <div id="proposalsList" class="proposals-list"></div>

    </main>

    <!-- History Tab -->
    <main class="content hidden" id="contentHistory">
      <h2 class="section-title">History</h2>
      <div class="stats-grid" id="stats"></div>
      <div id="historyList" class="history-list"></div>
    </main>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
      <button class="nav-btn active" id="tabHomeBtn">🏠 Home</button>
      <button class="nav-btn" id="tabHistoryBtn">📊 History</button>
    </nav>

  </div>

  <!-- Scripts - Module only -->
  <script type="module" src="app.js"></script>
  <script src="particles.js"></script>

</body>
</html>
